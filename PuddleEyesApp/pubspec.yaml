name: puddle_eyes_app
description: Prototype Flutter PuddleEyes V2
version: 0.1.0
environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  gpx: ^1.0.4            # pour créer/ exporter des fichier GPX
  path_provider: ^2.1.11 # pour récupèrer Le dossier de stockage
  geolocator: ^10.0.0    # GPS
  hive: ^2.2.3           # Stockage Locale
  hive_flutter: ^1.1.0
  flutter_map: ^4.2.0    # carte OpenStreetMap
  flutter_cube: ^0.1.1
  flutter_blue: ^0.8.0
  provider: ^6.0.0
  file_picker: ^6.1.1
  xml: ^6.5.0

flutter:
  assets:
    - assets/point.obj
    - assets/terrain.obj